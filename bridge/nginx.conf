# Nginx config for VPS deployment
# Place this at: /etc/nginx/sites-available/yourdomain.com
# Then: sudo ln -s /etc/nginx/sites-available/yourdomain.com /etc/nginx/sites-enabled/
# Then: sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name YOUR_DOMAIN_OR_IP;

    # Serve the built React frontend
    root /path/to/CLI-C+-Root/Client/frontend/dist;
    index index.html;

    # SPA fallback - serve index.html for all frontend routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy HTTP API requests to bridge auth server (port 8081)
    location /api/ {
        proxy_pass http://127.0.0.1:8081;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Proxy WebSocket to bridge WS server (port 8080)
    location /ws-bridge {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }
}

# To add HTTPS with Let's Encrypt:
# sudo apt install certbot python3-certbot-nginx
# sudo certbot --nginx -d yourdomain.com
